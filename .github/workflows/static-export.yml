name: Static Export

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: post-ci-${{ github.ref }}
  cancel-in-progress: false

env:
  DATABASE_URL: postgresql://blog:blogpassword@localhost:5432/blog
  STORAGE_DRIVER: mock
  MOCK_STORAGE_DIR: .ci-storage
  MOCK_STORAGE_PUBLIC_URL: https://storage.ci.test
  MOCK_STORAGE_BUCKET: blog-media
  AUTH_TRUST_HOST: 'true'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: blog
          POSTGRES_PASSWORD: blogpassword
          POSTGRES_DB: blog
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U blog -d blog"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup database
        uses: ./.github/actions/setup-database-storage

      - name: Run tests
        run: npm run lint

      - name: Build static export
        run: EXPORT=1 UNOPTIMIZED=1 npm run build
        env:
          EXPORT: 1
          UNOPTIMIZED: 1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: static-export
          path: out/
          retention-days: 30

      - name: Deploy to GitHub Pages
        if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.head_branch == 'main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          force_orphan: true
