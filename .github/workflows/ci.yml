name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://blog:blogpassword@localhost:5432/blog
  MINIO_ENDPOINT: http://localhost:9000
  MINIO_PUBLIC_URL: http://localhost:9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin
  MINIO_BUCKET: blog-media
  MINIO_REGION: us-east-1
  AUTH_TRUST_HOST: 'true'
  AUTH_DISABLE_RATE_LIMIT: 'true'
  AUTH_COOKIE_SECURE: 'false'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: blog
          POSTGRES_PASSWORD: blogpassword
          POSTGRES_DB: blog
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U blog -d blog"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      minio:
        image: minio/minio:latest
        command: server /data --console-address ":9001"
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000

    strategy:
      matrix:
        node-version: ['lts/*']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Initialize MinIO bucket
        run: |
          for attempt in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live >/dev/null; then
              echo "MinIO is ready"
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "MinIO did not become ready in time"
              exit 1
            fi
            echo "Waiting for MinIO... (${attempt}/30)"
            sleep 2
          done
          docker run --rm --network host minio/mc:latest /bin/sh -c "
            until mc alias set local http://localhost:9000 minioadmin minioadmin 2>/dev/null; do sleep 1; done
            mc mb local/blog-media --ignore-existing
            mc anonymous set download local/blog-media
          "

      - name: Setup database and storage
        uses: ./.github/actions/setup-database-storage

      - name: Run ESLint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test:ci

      - name: Run integration tests
        run: npm run test:integration:ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e:ci

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Build project
        run: npm run build

      - name: Check build output
        run: |
          if [ -d ".next" ]; then
            echo "✅ Build successful - .next directory exists"
          else
            echo "❌ Build failed - .next directory not found"
            exit 1
          fi

  security:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level moderate

      - name: Check for vulnerabilities
        run: |
          if npm audit --audit-level high; then
            echo "✅ No high severity vulnerabilities found"
          else
            echo "❌ High severity vulnerabilities detected"
            exit 1
          fi

  performance:
    runs-on: ubuntu-latest
    needs: security

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: blog
          POSTGRES_PASSWORD: blogpassword
          POSTGRES_DB: blog
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U blog -d blog"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      minio:
        image: minio/minio:latest
        command: server /data --console-address ":9001"
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Initialize MinIO bucket
        run: |
          for attempt in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live >/dev/null; then
              echo "MinIO is ready"
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "MinIO did not become ready in time"
              exit 1
            fi
            echo "Waiting for MinIO... (${attempt}/30)"
            sleep 2
          done
          docker run --rm --network host minio/mc:latest /bin/sh -c "
            until mc alias set local http://localhost:9000 minioadmin minioadmin 2>/dev/null; do sleep 1; done
            mc mb local/blog-media --ignore-existing
            mc anonymous set download local/blog-media
          "

      - name: Setup database and storage
        uses: ./.github/actions/setup-database-storage

      - name: Analyze bundle size
        run: npm run analyze
