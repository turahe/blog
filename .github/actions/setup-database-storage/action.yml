name: Setup database
description: Wait for PostgreSQL and apply Prisma schema.

inputs:
  skip-seed:
    description: Skip `prisma db seed`
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Wait for PostgreSQL
      shell: bash
      run: |
        for attempt in $(seq 1 30); do
          if docker run --rm --network host postgres:17-alpine \
            pg_isready -h localhost -p 5432 -U blog -d blog >/dev/null 2>&1; then
            echo "PostgreSQL is ready"
            exit 0
          fi
          echo "Waiting for PostgreSQL... (${attempt}/30)"
          sleep 2
        done
        echo "PostgreSQL did not become ready in time"
        exit 1

    - name: Apply database schema
      shell: bash
      run: npx prisma db push

    - name: Seed database
      if: inputs.skip-seed != 'true'
      shell: bash
      run: npx prisma db seed
